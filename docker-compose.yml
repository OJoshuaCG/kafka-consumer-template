# Infraestructura local para desarrollo y tests manuales.
# Redpanda (no Kafka/Zookeeper) — 1s startup, sin JVM.
# Levantar con: docker compose up -d

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.10
    container_name: kct-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
      - --smp=1
      - --default-log-level=info
    ports:
      - "19092:19092"   # Kafka (external)
      - "18081:18081"   # Schema Registry
      - "18082:18082"   # Pandaproxy
      - "9644:9644"     # Admin API
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: kct-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "8080:8080"     # UI

  redis:
    image: redis:7-alpine
    container_name: kct-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: kct-postgres
    environment:
      POSTGRES_USER: kafka
      POSTGRES_PASSWORD: kafka
      POSTGRES_DB: kafka_consumer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kafka -d kafka_consumer"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Consumer — solo cuando quieras ejercer el flujo completo
  # contra los servicios. En desarrollo normal corrés
  # `uv run example-consumer` desde el host.
  example-consumer:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kct-example-consumer
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DATABASE_URL: postgresql://kafka:kafka@postgres:5432/kafka_consumer
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      LOG_LEVEL: INFO

volumes:
  postgres_data:
